//a Random Sampling function 
function sampleRandomly(arr, count) {
    let result = [];
    let tempArray = arr.slice(); // Create a copy of the original array
      for (let i = 0; i < count; i++) {
          if(tempArray.length === 0) break; // Break if there are no more elements to sample
          const randomIndex = Math.floor(Math.random() * tempArray.length);
          result.push(tempArray[randomIndex]);
          tempArray.splice(randomIndex, 1); // Remove the selected element
          arr.splice(randomIndex, 1);
      }
    return result;
}

// Function to generate the sequence for the N-Back task
// It generates a sequence where every x-th number repeats a number that appeared earlier (2 steps back here).
function generateNBackSequence(length, x) {
    let sequence = [];
    for (let i = 0; i < length; i++) {
        if ((i + 1) % x === 0 && i > 1) {
            // Make the current number the same as the one presented two steps earlier
            sequence.push(sequence[sequence.length - 2]);
        } else {
            // Generate a random number between 0 and 9
            let randomNumber = Math.floor(Math.random() * 10);
            sequence.push(randomNumber);
        }
    }
    return sequence;
}
